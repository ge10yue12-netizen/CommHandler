[network]
; 本机绑定（UDP 接收）
local_ip=127.0.0.1
local_port=19105
; 对端（UDP 发送目的）
dest_ip=127.0.0.1
dest_port=19106
; 映射 CommHandler：iTransferType（1=UDP）、iModel
transfer_type=1
model=0

[smoke]
; 无头自检用 iProtoType（与 SocketComm 现行枚举一致）
; 0 JSON  1 万测  2 中机  3 三思  4 触发存图  5 福建威盛  6/7 纳百川
; 旧联恒协议已在库源码中注释废弃，本 Demo 不对齐
sansi_proto=3
json_proto=0
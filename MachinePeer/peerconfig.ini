[network]
; 对齐 CommunicationAssistant 兼容动态库默认：TCP 客户端连 127.0.0.1:9000
; 本工具默认作 TCP 服务端监听 9000
bind_ip=127.0.0.1
bind_port=9000
peer_ip=127.0.0.1
peer_port=9000
transfer_type=0
model=0
; 0=网口 1=串口
default_comm=0

; UDP 联调示例（助手须改为 UDP，本地端口=本工具 peer_port，远端端口=本工具 bind_port）：
; transfer_type=1
; bind_port=19106
; peer_port=19105

[serial]
; port_index 0=COM1；虚拟串口对时一侧用本工具、一侧用助手，参数须一致
port_index=4
baud=115200
